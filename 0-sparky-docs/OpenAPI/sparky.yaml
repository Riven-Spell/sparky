openapi: 3.0.3
info:
  title: Sparky - LLM Cluster Manager API
  description: |
    Sparky manages language models across a cluster of DGX Spark nodes.
    The manager provides a web UI, a router to live LLMs, and auto-loads models
    when requested. Each agent reports health on its node.
  version: 0.1.0
servers:
  - url: http://<manager-host>:8080
    description: Manager
  - url: http://<agent-host>:8081
    description: Agent
tags:
  - name: openai-compatible
    description: OpenAI-compatible APIs for model inference access
  - name: manager
    description: Sparky manager APIs for cluster-wide model and agent management
  - name: agent
    description: Sparky agent APIs for per-node health and diagnostics
paths:
  /v1/chat/completions:
    post:
      tags:
        - openai-compatible
      summary: Create chat completion
      description: |
        Route a chat-completion request to a loaded model.
        If the requested model isn't loaded, the manager auto-loads it
        on an available node (respecting eviction and time-gate rules).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  description: Name of the model to use.
                messages:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChatMessage'
                stream:
                  type: boolean
                  nullable: true
              required:
                - model
                - messages
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    enum:
                      - chat.completion
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        message:
                          $ref: '#/components/schemas/ChatMessage'
                        finish_reason:
                          type: string
                          enum:
                            - stop
                            - length
        '400':
          description: Bad request — model not registered
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
        '503':
          description: >-
            Service unavailable — model too large, cannot evict, or currently
            loading
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
            Retry-After:
              schema:
                type: integer
                description: Seconds after which to retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
  /v1/models:
    get:
      tags:
        - openai-compatible
      summary: List models
      description: >
        Return all models managed by Sparky, optionally filtering by load
        status.

        Without a parameter, returns every model (loaded and unloaded).
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - loaded
              - unloaded
              - loading
              - evicting
              - crashing
          description: Filter models by their current load status.
      responses:
        '200':
          description: A list of models
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClusterModel'
                  object:
                    type: string
                    enum:
                      - list
    post:
      tags:
        - manager
      summary: Load a model
      description: |
        Force-load a specific model. If the model is already loaded,
        the request is a no-op. Triggers the same eviction / time-gate
        logic as the OpenAI-compatible API.
      parameters:
        - name: model
          in: query
          required: true
          schema:
            type: string
          description: Model identifier to load.
      responses:
        '202':
          description: Model load request accepted
        '400':
          description: Bad request — model not registered
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
        '404':
          description: Model not found
        '503':
          description: Service unavailable — model too large or cannot evict
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
            Retry-After:
              schema:
                type: integer
                description: Seconds after which to retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
    delete:
      tags:
        - manager
      summary: Unload a model
      description: |
        Forcefully unload a model, optionally bypassing its time-gate.
      parameters:
        - name: model
          in: query
          required: true
          schema:
            type: string
          description: Model identifier to unload.
      responses:
        '200':
          description: Model unload accepted
        '400':
          description: Bad request — model not registered
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
        '404':
          description: Model not found
  /v1/completions:
    post:
      tags:
        - openai-compatible
      summary: Create completion
      description: |
        Route a legacy-text-completion request to a loaded model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                prompt:
                  type: string
                stream:
                  type: boolean
                  nullable: true
              required:
                - model
                - prompt
      responses:
        '200':
          description: Completion response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    enum:
                      - text_completion
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        index:
                          type: integer
                        finish_reason:
                          type: string
        '400':
          description: Bad request — model not registered
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
        '503':
          description: >-
            Service unavailable — model too large, cannot evict, or currently
            loading
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
            Retry-After:
              schema:
                type: integer
                description: Seconds after which to retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
  /v1/config/reload:
    post:
      tags:
        - manager
      summary: Reload configuration
      description: |
        Reload the manager configuration file from disk. This updates the
        registered models and other settings without restarting the process.
      responses:
        '200':
          description: Configuration reloaded successfully
        '500':
          description: Failed to reload configuration
  /v1/agents:
    get:
      tags:
        - manager
      summary: List all agents in the cluster
      description: Return every agent node the manager has registered.
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
  /v1/agents/health:
    get:
      tags:
        - manager
      summary: Get agent node health by ID
      description: >
        Diagnostic endpoint for a specific agent node: models loaded, alive
        status, memory usage.
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
          description: The agent IP address.
      responses:
        '200':
          description: Agent health status. '*'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHealth'
    post:
      tags:
        - manager
      summary: Report agent health
      description: >
        Push a health report from an agent to the manager.

        The agent ID is carried in the request body, and *must* match the local
        IP from which this request was sent.

        Used for immediate state changes such as a model crashing or being

        loaded/unloaded outside the normal manager flow (e.g. via CLI).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentHealth'
      responses:
        '204':
          description: Health report accepted
        '400':
          description: Bad request — agent ID does not match request source IP
          headers:
            X-Sparky-ErrorCode:
              schema:
                $ref: '#/components/schemas/SparkyErrorCode'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparkyError'
        '404':
          description: Agent not found
  /v1/health:
    get:
      tags:
        - agent
      summary: Get self-health
      description: >
        Local health report from an agent node: whether the node is alive, what
        models it has loaded, and memory usage.
      parameters:
        - name: fresh
          in: query
          required: false
          schema:
            type: boolean
          description: When true, bypass cached health data and perform a real-time check.
      responses:
        '200':
          description: Agent self-health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHealth'
components:
  schemas:
    SparkyError:
      type: object
      properties:
        ErrorCode:
          type: string
          description: Machine-readable error code.
        ErrorDetail:
          type: string
          description: Human-readable explanation of the error.
      required:
        - ErrorCode
        - ErrorDetail
    SparkyErrorCode:
      type: string
      enum:
        - ModelNotRegistered
        - ModelTooLarge
        - CannotEvict
        - ModelLoading
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
        content:
          type: string
      required:
        - role
        - content
    ModelObject:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum:
            - model
        created:
          type: integer
        owned_by:
          type: string
      required:
        - id
        - object
        - created
        - owned_by
    ClusterModel:
      type: object
      properties:
        name:
          type: string
          description: Model name / identifier.
        sparkrun_id:
          type: string
          nullable: true
          description: sparkrun model identifier (recipe name), useful for SSH diagnostics
        status:
          type: string
          enum:
            - loaded
            - unloaded
            - loading
            - evicting
            - crashing
        endpoint:
          type: string
          nullable: true
          description: The HTTP endpoint of the model, if it is reachable.
        since:
          type: integer
          format: int64
          description: >-
            How long since the model was started, or became available (including time before the HTTP
            server became available.) formatted as a UNIX timestamp.
        no_list:
          type: boolean
          default: false
          description: >
            When true, the model occupies the node but is not exposed for
            inference (derived from container label `sparky.nolist`).
            The node's capacity is consumed but the model won't appear in
            inference routing.
        no_evict:
          type: boolean
          default: false
          description: >
            When true, the model will not be auto-evicted. Only manual
            eviction can remove it (derived from container label
            `sparky.noevict`).
      required:
        - name
        - status
    RegisteredModel:
      type: object
      properties:
        name:
          type: string
          description: Derived model identifier.
        recipe_address:
          type: string
          description: Sparkrun recipe address (e.g. "@official/llama-3-70b").
        nodes:
          type: integer
          minimum: 1
          default: 1
          description: Number of nodes (sparks) this model requires.
      required:
        - name
        - recipe_address
        - nodes
    Agent:
      type: object
      properties:
        id:
          type: string
          description: Agent IP address.
        name:
          type: string
          description: Human-readable node name.
    AgentHealth:
      type: object
      properties:
        id:
          type: string
          description: Agent IP address.
        alive:
          type: boolean
          description: Whether the agent is still responding.
        memory_used_gb:
          type: number
          description: VRAM / contiguous memory currently in use.
        models:
          type: array
          items:
            $ref: '#/components/schemas/ClusterModel'
      required:
        - id
        - alive
        - memory_used_gb
