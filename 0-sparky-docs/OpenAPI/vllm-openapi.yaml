openapi: 3.1.0
info:
  title: FastAPI
  version: 0.1.0
paths:
  /load:
    get:
      summary: Get Server Load Metrics
      operationId: get_server_load_metrics_load_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /version:
    get:
      summary: Show Version
      operationId: show_version_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health
      description: Health check.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
  /metrics:
    get:
      summary: Metrics
      description: Endpoint that serves Prometheus metrics.
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            text/plain; version=1.0.0; charset=utf-8:
              schema:
                type: string
  /tokenize:
    post:
      summary: Tokenize
      operationId: tokenize_tokenize_post
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/TokenizeCompletionRequest'
                - $ref: '#/components/schemas/TokenizeChatRequest'
              title: Request
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /detokenize:
    post:
      summary: Detokenize
      operationId: detokenize_detokenize_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetokenizeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/models:
    get:
      summary: Show Available Models
      operationId: show_available_models_v1_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /ping:
    get:
      summary: Ping
      description: Ping check. Endpoint required for SageMaker
      operationId: ping_ping_get
      responses:
        '200':
          description: Successful Response
    post:
      summary: Ping
      description: Ping check. Endpoint required for SageMaker
      operationId: ping_ping_post
      responses:
        '200':
          description: Successful Response
  /invocations:
    post:
      summary: Decorated Func
      description: The actual wrapped handler function that applies transformations.
      operationId: decorated_func_invocations_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/chat/completions:
    post:
      summary: Create Chat Completion
      operationId: create_chat_completion_v1_chat_completions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/chat/completions/batch:
    post:
      summary: Create Batch Chat Completion
      operationId: create_batch_chat_completion_v1_chat_completions_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchChatCompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/responses:
    post:
      summary: Create Responses
      operationId: create_responses_v1_responses_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/responses/{response_id}:
    get:
      summary: Retrieve Responses
      operationId: retrieve_responses_v1_responses__response_id__get
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
            title: Response Id
        - name: starting_after
          in: query
          required: false
          schema:
            anyOf:
              - type: integer
              - type: 'null'
            title: Starting After
        - name: stream
          in: query
          required: false
          schema:
            anyOf:
              - type: boolean
              - type: 'null'
            default: false
            title: Stream
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/responses/{response_id}/cancel:
    post:
      summary: Cancel Responses
      operationId: cancel_responses_v1_responses__response_id__cancel_post
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
            title: Response Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/completions:
    post:
      summary: Create Completion
      operationId: create_completion_v1_completions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/messages:
    post:
      summary: Create Messages
      operationId: create_messages_v1_messages_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnthropicMessagesRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicErrorResponse'
  /v1/messages/count_tokens:
    post:
      summary: Count Tokens
      operationId: count_tokens_v1_messages_count_tokens_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnthropicCountTokensRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicCountTokensResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicErrorResponse'
  /generative_scoring:
    post:
      summary: Create Generative Scoring
      operationId: create_generative_scoring_generative_scoring_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /inference/v1/generate:
    post:
      summary: Generate
      operationId: generate_inference_v1_generate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
            text/event-stream: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /scale_elastic_ep:
    post:
      summary: Scale Elastic Ep
      operationId: scale_elastic_ep_scale_elastic_ep_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response 200 Scale Elastic Ep Scale Elastic Ep Post
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Request Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /is_scaling_elastic_ep:
    post:
      summary: Is Scaling Elastic Ep
      operationId: is_scaling_elastic_ep_is_scaling_elastic_ep_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/chat/completions/render:
    post:
      summary: Render Chat Completion
      operationId: render_chat_completion_v1_chat_completions_render_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateRequest'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/completions/render:
    post:
      summary: Render Completion
      operationId: render_completion_v1_completions_render_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GenerateRequest'
                type: array
                title: Response Render Completion V1 Completions Render Post
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AcknowledgedSafetyCheck:
      properties:
        id:
          type: string
          title: Id
        code:
          anyOf:
            - type: string
            - type: 'null'
          title: Code
        message:
          anyOf:
            - type: string
            - type: 'null'
          title: Message
      additionalProperties: true
      type: object
      required:
        - id
      title: AcknowledgedSafetyCheck
      description: A pending safety check for the computer call.
    Action:
      properties:
        commands:
          items:
            type: string
          type: array
          title: Commands
        max_output_length:
          anyOf:
            - type: integer
            - type: 'null'
          title: Max Output Length
        timeout_ms:
          anyOf:
            - type: integer
            - type: 'null'
          title: Timeout Ms
      additionalProperties: true
      type: object
      required:
        - commands
      title: Action
      description: The shell commands and limits that describe how to run the tool call.
    ActionDragPath:
      properties:
        x:
          type: integer
          title: X
        'y':
          type: integer
          title: 'Y'
      additionalProperties: true
      type: object
      required:
        - x
        - 'y'
      title: ActionDragPath
      description: 'An x/y coordinate pair, e.g. `{ x: 100, y: 200 }`.'
    ActionFind:
      properties:
        pattern:
          type: string
          title: Pattern
        type:
          type: string
          const: find_in_page
          title: Type
        url:
          type: string
          title: Url
      additionalProperties: true
      type: object
      required:
        - pattern
        - type
        - url
      title: ActionFind
      description: 'Action type "find_in_page": Searches for a pattern within a loaded page.'
    ActionKeypress:
      properties:
        keys:
          items:
            type: string
          type: array
          title: Keys
        type:
          type: string
          const: keypress
          title: Type
      additionalProperties: true
      type: object
      required:
        - keys
        - type
      title: ActionKeypress
      description: A collection of keypresses the model would like to perform.
    ActionScreenshot:
      properties:
        type:
          type: string
          const: screenshot
          title: Type
      additionalProperties: true
      type: object
      required:
        - type
      title: ActionScreenshot
      description: A screenshot action.
    ActionSearchSource:
      properties:
        type:
          type: string
          const: url
          title: Type
        url:
          type: string
          title: Url
      additionalProperties: true
      type: object
      required:
        - type
        - url
      title: ActionSearchSource
      description: A source used in the search.
    ActionType:
      properties:
        text:
          type: string
          title: Text
        type:
          type: string
          const: type
          title: Type
      additionalProperties: true
      type: object
      required:
        - text
        - type
      title: ActionType
      description: An action to type in text.
    ActionWait:
      properties:
        type:
          type: string
          const: wait
          title: Type
      additionalProperties: true
      type: object
      required:
        - type
      title: ActionWait
      description: A wait action.
    AnnotationContainerFileCitation:
      properties:
        container_id:
          type: string
          title: Container Id
        end_index:
          type: integer
          title: End Index
        file_id:
          type: string
          title: File Id
        filename:
          type: string
          title: Filename
        start_index:
          type: integer
          title: Start Index
        type:
          type: string
          const: container_file_citation
          title: Type
      additionalProperties: true
      type: object
      required:
        - container_id
        - end_index
        - file_id
        - filename
        - start_index
        - type
      title: AnnotationContainerFileCitation
      description: A citation for a container file used to generate a model response.
    AnnotationFileCitation:
      properties:
        file_id:
          type: string
          title: File Id
        filename:
          type: string
          title: Filename
        index:
          type: integer
          title: Index
        type:
          type: string
          const: file_citation
          title: Type
      additionalProperties: true
      type: object
      required:
        - file_id
        - filename
        - index
        - type
      title: AnnotationFileCitation
      description: A citation to a file.
    AnnotationFilePath:
      properties:
        file_id:
          type: string
          title: File Id
        index:
          type: integer
          title: Index
        type:
          type: string
          const: file_path
          title: Type
      additionalProperties: true
      type: object
      required:
        - file_id
        - index
        - type
      title: AnnotationFilePath
      description: A path to a file.
    AnnotationURLCitation:
      properties:
        end_index:
          type: integer
          title: End Index
        start_index:
          type: integer
          title: Start Index
        title:
          type: string
          title: Title
        type:
          type: string
          const: url_citation
          title: Type
        url:
          type: string
          title: Url
      additionalProperties: true
      type: object
      required:
        - end_index
        - start_index
        - title
        - type
        - url
      title: AnnotationURLCitation
      description: A citation for a web resource used to generate a model response.
    AnthropicContentBlock:
      properties:
        type:
          type: string
          enum:
            - text
            - image
            - tool_use
            - tool_result
            - tool_reference
            - thinking
            - redacted_thinking
          title: Type
        text:
          anyOf:
            - type: string
            - type: 'null'
          title: Text
        source:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Source
        id:
          anyOf:
            - type: string
            - type: 'null'
          title: Id
        tool_use_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Tool Use Id
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        input:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Input
        content:
          anyOf:
            - type: string
            - items:
                additionalProperties: true
                type: object
              type: array
            - type: 'null'
          title: Content
        is_error:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Is Error
        tool_name:
          anyOf:
            - type: string
            - type: 'null'
          title: Tool Name
        thinking:
          anyOf:
            - type: string
            - type: 'null'
          title: Thinking
        signature:
          anyOf:
            - type: string
            - type: 'null'
          title: Signature
        data:
          anyOf:
            - type: string
            - type: 'null'
          title: Data
      type: object
      required:
        - type
      title: AnthropicContentBlock
      description: Content block in message
    AnthropicContextManagement:
      properties:
        original_input_tokens:
          type: integer
          title: Original Input Tokens
      type: object
      required:
        - original_input_tokens
      title: AnthropicContextManagement
      description: Context management information for token counting.
    AnthropicCountTokensRequest:
      properties:
        model:
          type: string
          title: Model
        messages:
          items:
            $ref: '#/components/schemas/AnthropicMessage'
          type: array
          title: Messages
        system:
          anyOf:
            - type: string
            - items:
                $ref: '#/components/schemas/AnthropicContentBlock'
              type: array
            - type: 'null'
          title: System
        tool_choice:
          anyOf:
            - $ref: '#/components/schemas/AnthropicToolChoice'
            - type: 'null'
        tools:
          anyOf:
            - items:
                $ref: '#/components/schemas/AnthropicTool'
              type: array
            - type: 'null'
          title: Tools
        chat_template_kwargs:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Chat Template Kwargs
          description: >-
            Additional keyword args to pass to the chat template renderer. Will
            be accessible by the template.
      type: object
      required:
        - model
        - messages
