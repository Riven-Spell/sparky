            - type: 'null'
          title: Tools
        tool_choice:
          anyOf:
            - type: string
              const: none
            - type: string
              const: auto
            - type: string
              const: required
            - $ref: '#/components/schemas/ChatCompletionNamedToolChoiceParam'
            - type: 'null'
          title: Tool Choice
          default: none
        reasoning_effort:
          anyOf:
            - type: string
              enum:
                - none
                - minimal
                - low
                - medium
                - high
                - xhigh
                - max
            - type: 'null'
          title: Reasoning Effort
          description: >-
            Constrains effort on reasoning for reasoning models. Currently
            supported values are none, minimal, low, medium, high, xhigh, and
            max. Reducing reasoning effort can result in faster responses and
            fewer tokens used on reasoning in a response. Note that 'max' is
            specific to the DeepSeek V4 series and is not part of the standard
            OpenAI API specification.
        thinking_token_budget:
          anyOf:
            - type: integer
            - type: 'null'
          title: Thinking Token Budget
        include_reasoning:
          type: boolean
          title: Include Reasoning
          default: true
        parallel_tool_calls:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Parallel Tool Calls
          default: true
        user:
          anyOf:
            - type: string
            - type: 'null'
          title: User
        use_beam_search:
          type: boolean
          title: Use Beam Search
          default: false
        top_k:
          anyOf:
            - type: integer
            - type: 'null'
          title: Top K
        min_p:
          anyOf:
            - type: number
            - type: 'null'
          title: Min P
        repetition_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Repetition Penalty
        length_penalty:
          type: number
          title: Length Penalty
          default: 1
        stop_token_ids:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Stop Token Ids
          default: []
        include_stop_str_in_output:
          type: boolean
          title: Include Stop Str In Output
          default: false
        ignore_eos:
          type: boolean
          title: Ignore Eos
          default: false
        min_tokens:
          type: integer
          title: Min Tokens
          default: 0
        skip_special_tokens:
          type: boolean
          title: Skip Special Tokens
          default: true
        spaces_between_special_tokens:
          type: boolean
          title: Spaces Between Special Tokens
          default: true
        truncate_prompt_tokens:
          anyOf:
            - type: integer
              maximum: 9223372036854776000
              minimum: -1
            - type: 'null'
          title: Truncate Prompt Tokens
        truncation_side:
          anyOf:
            - type: string
              enum:
                - left
                - right
            - type: 'null'
          title: Truncation Side
          description: >-
            Which side to truncate from when truncate_prompt_tokens is active.
            'right' keeps the first N tokens. 'left' keeps the last N tokens.
        prompt_logprobs:
          anyOf:
            - type: integer
            - type: 'null'
          title: Prompt Logprobs
        allowed_token_ids:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Allowed Token Ids
        bad_words:
          items:
            type: string
          type: array
          title: Bad Words
        echo:
          type: boolean
          title: Echo
          description: >-
            If true, the new message will be prepended with the last message if
            they belong to the same role.
          default: false
        add_generation_prompt:
          type: boolean
          title: Add Generation Prompt
          description: >-
            If true, the generation prompt will be added to the chat template.
            This is a parameter used by chat template in tokenizer config of the
            model.
          default: true
        continue_final_message:
          type: boolean
          title: Continue Final Message
          description: >-
            If this is set, the chat will be formatted so that the final message
            in the chat is open-ended, without any EOS tokens. The model will
            continue this message rather than starting a new one. This allows
            you to "prefill" part of the model's response for it. Cannot be used
            at the same time as `add_generation_prompt`.
          default: false
        add_special_tokens:
          type: boolean
          title: Add Special Tokens
          description: >-
            If true, special tokens (e.g. BOS) will be added to the prompt on
            top of what is added by the chat template. For most models, the chat
            template takes care of adding the special tokens so this should be
            set to false (as is the default).
          default: false
        documents:
          anyOf:
            - items:
                additionalProperties:
                  type: string
                type: object
              type: array
            - type: 'null'
          title: Documents
          description: >-
            A list of dicts representing documents that will be accessible to
            the model if it is performing RAG (retrieval-augmented generation).
            If the template does not support RAG, this argument will have no
            effect. We recommend that each document should be a dict containing
            "title" and "text" keys.
        chat_template:
          anyOf:
            - type: string
            - type: 'null'
          title: Chat Template
          description: >-
            A Jinja template to use for this conversion. As of transformers
            v4.44, default chat template is no longer allowed, so you must
            provide a chat template if the tokenizer does not define one.
        chat_template_kwargs:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Chat Template Kwargs
          description: >-
            Additional keyword args to pass to the template renderer. Will be
            accessible by the chat template.
        media_io_kwargs:
          anyOf:
            - additionalProperties:
                additionalProperties: true
                type: object
              type: object
            - type: 'null'
          title: Media Io Kwargs
          description: >-
            Additional kwargs to pass to the media IO connectors, keyed by
            modality. Merged with engine-level media_io_kwargs.
        mm_processor_kwargs:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Mm Processor Kwargs
          description: Additional kwargs to pass to the HF processor.
        structured_outputs:
          anyOf:
            - $ref: '#/components/schemas/StructuredOutputsParams'
            - type: 'null'
          description: Additional kwargs for structured outputs
        priority:
          type: integer
          maximum: 9223372036854776000
          minimum: -9223372036854776000
          title: Priority
          description: >-
            The priority of the request (lower means earlier handling; default:
            0). Any priority other than 0 will raise an error if the served
            model does not use priority scheduling.
          default: 0
        request_id:
          type: string
          title: Request Id
          description: >-
            The request_id related to this request. If the caller does not set
            it, a random_uuid will be generated. This id is used through out the
            inference process and return in response.
        return_tokens_as_token_ids:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Return Tokens As Token Ids
          description: >-
            If specified with 'logprobs', tokens are represented  as strings of
            the form 'token_id:{token_id}' so that tokens that are not
            JSON-encodable can be identified.
        return_token_ids:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Return Token Ids
          description: >-
            If specified, the result will include token IDs alongside the
            generated text. In streaming mode, prompt_token_ids is included only
            in the first chunk, and token_ids contains the delta tokens for each
            chunk. This is useful for debugging or when you need to map
            generated text back to input tokens.
        return_prompt_text:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Return Prompt Text
          description: >-
            If true, the response will include ``prompt_text`` containing the
            prompt string produced by chat templating. In streaming mode it is
            sent only on the first chunk. This is useful for inspecting exactly
            what was fed into the model.
        cache_salt:
          anyOf:
            - type: string
            - type: 'null'
          title: Cache Salt
          description: >-
            If specified, the prefix cache will be salted with the provided
            string to prevent an attacker to guess prompts in multi-user
            environments. The salt should be random, protected from access by
            3rd parties, and long enough to be unpredictable (e.g., 43
            characters base64-encoded, corresponding to 256 bit).
        kv_transfer_params:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Kv Transfer Params
          description: KVTransfer parameters used for disaggregated serving.
        vllm_xargs:
          anyOf:
            - additionalProperties:
                anyOf:
                  - type: string
                  - type: integer
                  - type: number
                  - items:
                      anyOf:
                        - type: string
                        - type: integer
                        - type: number
                    type: array
              type: object
            - type: 'null'
          title: Vllm Xargs
          description: >-
            Additional request parameters with (list of) string or numeric
            values, used by custom extensions.
        repetition_detection:
          anyOf:
            - $ref: '#/components/schemas/RepetitionDetectionParams'
            - type: 'null'
          description: >-
            Parameters for detecting repetitive N-gram patterns in output
            tokens. If such repetition is detected, generation will be ended
            early. LLMs can sometimes generate repetitive, unhelpful token
            patterns, stopping only when they hit the maximum output length
            (e.g. 'abcdabcdabcd...' or '\emoji \emoji \emoji ...'). This feature
            can detect such behavior and terminate early, saving time and
            tokens.
      additionalProperties: true
      type: object
      required:
        - messages
      title: ChatCompletionRequest
